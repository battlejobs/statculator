<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="images/icon_180.png">


    <title>statculator</title>

    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">

</head>

<body>

    <div id="app">


        <div id="counter_muscle" class="counter">

            <div id="display_muscle" class="display">
                0
            </div>

            <div class="buttons">

                <button class="plus">
                    <img src="images/plus.svg" alt="Plus">
                </button>

                <button class="minus">
                    <img src="images/minus.svg" alt="Minus">
                </button>

                <button class="clear">
                    <img src="images/clear.svg" alt="Clear">
                </button>

            </div>

        </div>

        <div id="counter_brain" class="counter">

            <div id="display_brain" class="display">
                0
            </div>

            <div class="buttons">

                <button class="plus">
                    <img src="images/plus.svg" alt="Plus">
                </button>

                <button class="minus">
                    <img src="images/minus.svg" alt="Minus">
                </button>

                <button class="clear">
                    <img src="images/clear.svg" alt="Clear">
                </button>

            </div>

        </div>

        <div id="counter_skill" class="counter">

            <div id="display_skill" class="display">
                0
            </div>

            <div class="buttons">

                <button class="plus">
                    <img src="images/plus.svg" alt="Plus">
                </button>

                <button class="minus">
                    <img src="images/minus.svg" alt="Minus">
                </button>

                <button class="clear">
                    <img src="images/clear.svg" alt="Clear">
                </button>

            </div>

        </div>

        <div id="counter_money" class="counter">

            <div id="display_money" class="display">
                0
            </div>

            <div class="buttons">

                <button class="plus">
                    <img src="images/plus.svg" alt="Plus">
                </button>

                <button class="minus">
                    <img src="images/minus.svg" alt="Minus">
                </button>

                <button class="clear">
                    <img src="images/clear.svg" alt="Clear">
                </button>

            </div>

        </div>

    </div>

    <div id="bottom">
        <div id="logo">
            <img src="images/logo.svg" alt="Logo">
        </div>
        <div class="groups">
            <button class="group1">
                       <img src="images/group1.svg" alt="">
            </button>

         <button class="group2">
                        <img src="images/group2.svg" alt="">
            </button>
        
            <button class="group3">
                        <img src="images/group3.svg" alt="">
            </button>
        </div>

        <div id="schrift">
            <img src="images/battlejobs.svg" alt="schrift">
        </div>

        
    </div>


    <script src="script.js"></script>

</body>

</html>
